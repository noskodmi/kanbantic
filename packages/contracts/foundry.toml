[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
verbosity = 2
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.ci]
verbosity = 4

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
